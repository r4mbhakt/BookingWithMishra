{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | Bloody Mary Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        /* ==========================================================================
           BLOODY MARY EDITION - DYNAMIC SUCCESS & QR TERMINAL
           ========================================================================== */
        :root {
            --pure-black: #000000;
            --card-bg: rgba(10, 2, 2, 0.85);
            --blood-plasma: #ff0808;
            --blood-coagulated: #9e0000;
            --blood-arterial: #610000;
            --text-pure-white: #ffffff;
            --text-muted: #888888;
            --font-cinzel: 'Cinzel Decorative', cursive;
            --font-monty: 'Montserrat', sans-serif;
            --vfx-glow: 0 0 15px rgba(255, 8, 8, 0.6), 0 0 40px rgba(158, 0, 0, 0.4);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--pure-black);
            color: var(--text-pure-white);
            font-family: var(--font-monty);
            background-image: radial-gradient(circle at 50% 50%, #150000 0%, var(--pure-black) 70%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ---------------------------------------------------
           THE SUCCESS TERMINAL BOX
           --------------------------------------------------- */
        .success-box {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border: 1px solid rgba(158, 0, 0, 0.4);
            border-radius: 8px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(158,0,0,0.15);
            position: relative;
            z-index: 2;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .success-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--blood-plasma), transparent);
            box-shadow: var(--vfx-glow);
        }

        /* ---------------------------------------------------
           TYPOGRAPHY & ICONS
           --------------------------------------------------- */
        .success-icon {
            font-size: 3rem;
            color: var(--blood-plasma);
            text-shadow: 0 0 20px rgba(255, 8, 8, 0.8);
            margin-bottom: 20px;
            animation: pulseIcon 2s infinite alternate;
        }

        .success-box h1 {
            font-family: var(--font-cinzel);
            font-size: 2.2rem;
            color: var(--text-pure-white);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 0 10px rgba(255,8,8,0.3);
        }

        .success-box h2 {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        /* ---------------------------------------------------
           DYNAMIC QR CODE SCANNER
           --------------------------------------------------- */
        .qr-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 35px auto;
            background: #ffffff; /* Must be white for scanner readability */
            padding: 15px;
            border-radius: 6px;
            border: 2px solid var(--blood-arterial);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 30px rgba(138, 3, 3, 0.4);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .qr-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .qr-wrapper:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: var(--blood-plasma);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9), 0 0 50px rgba(255, 8, 8, 0.5);
        }

        /* Cyberpunk Laser Animation */
        .qr-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: var(--blood-plasma);
            box-shadow: 0 0 15px var(--blood-plasma), 0 0 30px var(--blood-plasma);
            animation: qrScanner 2.5s ease-in-out infinite alternate;
            pointer-events: none;
        }

        /* ---------------------------------------------------
           ACTION BUTTON
           --------------------------------------------------- */
        .btn-primary {
            display: inline-block;
            width: 100%;
            padding: 16px 0;
            background: linear-gradient(135deg, var(--blood-coagulated), var(--blood-arterial));
            color: var(--text-pure-white);
            font-family: var(--font-monty);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid var(--blood-plasma);
            border-radius: 4px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--blood-plasma), var(--blood-coagulated));
            box-shadow: var(--vfx-glow);
            transform: translateY(-2px);
            color: var(--text-pure-white);
        }

        /* Light sweep effect on hover */
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg);
            transition: 0.6s ease;
        }
        .btn-primary:hover::after { left: 150%; }

        /* ---------------------------------------------------
           KEYFRAMES
           --------------------------------------------------- */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes pulseIcon {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.3); }
        }

        @keyframes qrScanner {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>

<div class="success-box">
    
    <i class="fa-solid fa-qrcode success-icon"></i>

    <h1>BOOKING CONFIRMED</h1>
    <h2>Your premium reservation is successful.</h2>
    
    {% if booking.qr_code %}
    <div class="qr-wrapper">
        <img src="{{ booking.qr_code.url }}" class="qr-image" alt="VVIP Access QR">
    </div>
    {% endif %}

    <a href="/movies/" class="btn-primary">
        BACK TO MOVIES
    </a>

</div>

</body>
</html>
